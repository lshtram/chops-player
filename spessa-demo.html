<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SpessaSynth Raw API Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      gap: 20px;
      padding: 32px 24px;
    }
    .badge {
      font-size: 0.65rem;
      background: #f0b429;
      color: #000;
      padding: 3px 10px;
      border-radius: 4px;
      letter-spacing: 0.12em;
      font-weight: bold;
    }
    h1 {
      color: #f0b429;
      font-size: 2rem;
      font-family: monospace;
      text-align: center;
    }
    .build-info {
      font-size: 0.72rem;
      color: #6e7681;
      text-align: center;
    }
    .build-info strong { color: #f0b429; }
    #status { font-size: 0.85rem; color: #8b949e; }

    /* ── Instrument sections ─────────────────────────────── */
    .instruments {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 640px;
    }
    .section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px 20px;
    }
    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6e7681;
      margin-bottom: 12px;
    }
    .section-title span {
      font-weight: bold;
      margin-right: 6px;
    }
    .section-title .ch-piano  { color: #58a6ff; }
    .section-title .ch-bass   { color: #3fb950; }
    .section-title .ch-guitar { color: #e3b341; }
    .section-title .ch-drums  { color: #f78166; }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    button {
      font-family: monospace;
      font-size: 0.85rem;
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
      transition: filter 0.1s, transform 0.08s;
      border: none;
    }
    button:active { transform: scale(0.95); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-piano  { background: #1f4068; color: #58a6ff; border: 1px solid #58a6ff44; }
    .btn-piano:hover:not(:disabled)  { filter: brightness(1.3); }
    .btn-bass   { background: #1a3a27; color: #3fb950; border: 1px solid #3fb95044; }
    .btn-bass:hover:not(:disabled)   { filter: brightness(1.3); }
    .btn-guitar { background: #3a2f00; color: #e3b341; border: 1px solid #e3b34144; }
    .btn-guitar:hover:not(:disabled) { filter: brightness(1.3); }
    .btn-drum   { background: #3a1a1a; color: #f78166; border: 1px solid #f7816644; }
    .btn-drum:hover:not(:disabled)   { filter: brightness(1.3); }
    .btn-groove { background: #2d1b69; color: #d2a8ff; border: 1px solid #d2a8ff44; font-size: 0.8rem; }
    .btn-groove:hover:not(:disabled) { filter: brightness(1.3); }
    .btn-stop   { background: #3d1f00; color: #ffa657; border: 1px solid #ffa65744; }
    .btn-stop:hover:not(:disabled)   { filter: brightness(1.3); }

    #log {
      font-size: 0.75rem;
      color: #3fb950;
      min-height: 1.2em;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="badge">RAW SPESSASYNTH DEBUG</div>

  <h1>SpessaSynth<br>Raw API Test</h1>

  <div class="build-info">
    <strong>v13</strong> &nbsp;·&nbsp; Wed Apr 8 2026 22:45 IDT
  </div>

  <div id="status">Initializing…</div>

  <div class="instruments" id="ui" style="opacity:0.3;pointer-events:none">

    <!-- ── PIANO ──────────────────────────────────────── -->
    <div class="section">
      <div class="section-title"><span class="ch-piano">■</span> Piano</div>
      <div class="btn-row">
        <button class="btn-piano" data-ch="0" data-note="60">C4</button>
        <button class="btn-piano" data-ch="0" data-note="64">E4</button>
        <button class="btn-piano" data-ch="0" data-note="67">G4</button>
        <button class="btn-piano" data-ch="0" data-note="72">C5</button>
        <button class="btn-piano" id="chordBtn">C maj chord</button>
        <button class="btn-groove" id="pianoRiffBtn">▶ riff</button>
      </div>
    </div>

    <!-- ── BASS ───────────────────────────────────────── -->
    <div class="section">
      <div class="section-title"><span class="ch-bass">■</span> Bass</div>
      <div class="btn-row">
        <button class="btn-bass" data-ch="1" data-note="36">C2</button>
        <button class="btn-bass" data-ch="1" data-note="40">E2</button>
        <button class="btn-bass" data-ch="1" data-note="43">G2</button>
        <button class="btn-bass" data-ch="1" data-note="48">C3</button>
        <button class="btn-groove" id="bassRiffBtn">▶ riff</button>
      </div>
    </div>

    <!-- ── GUITAR ─────────────────────────────────────── -->
    <div class="section">
      <div class="section-title"><span class="ch-guitar">■</span> Guitar</div>
      <div class="btn-row">
        <button class="btn-guitar" data-ch="2" data-note="52">E3</button>
        <button class="btn-guitar" data-ch="2" data-note="55">G3</button>
        <button class="btn-guitar" data-ch="2" data-note="59">B3</button>
        <button class="btn-guitar" data-ch="2" data-note="64">E4</button>
        <button class="btn-guitar" id="guitarChordBtn">C maj voicing</button>
        <button class="btn-groove" id="guitarRiffBtn">▶ riff</button>
      </div>
    </div>

    <!-- ── DRUMS ──────────────────────────────────────── -->
    <div class="section">
      <div class="section-title"><span class="ch-drums">■</span> Drums</div>
      <div class="btn-row">
        <button class="btn-drum" data-ch="9" data-note="36">Kick</button>
        <button class="btn-drum" data-ch="9" data-note="38">Snare</button>
        <button class="btn-drum" data-ch="9" data-note="42">Hi-hat</button>
        <button class="btn-drum" data-ch="9" data-note="46">Open HH</button>
        <button class="btn-drum" data-ch="9" data-note="49">Crash</button>
        <button class="btn-groove" id="drumGrooveBtn">▶ groove</button>
      </div>
    </div>

    <!-- ── ALL TOGETHER ───────────────────────────────── -->
    <div class="section">
      <div class="section-title">All together</div>
      <div class="btn-row">
        <button class="btn-groove" id="bandBtn">▶ band (4 bars)</button>
        <button class="btn-stop" id="stopBtn">■ stop all</button>
      </div>
    </div>

  </div>

  <div id="log"></div>

  <script type="module">
    import { WorkletSynthesizer } from 'spessasynth_lib';

    const SOUNDFONT_URL = '/soundfonts/chops-instruments.sf2';
    const WORKER_URL    = '/workers/spessasynth_processor.min.js';

    const logEl   = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const ui       = document.getElementById('ui');

    let audioCtx = null;
    let synth    = null;
    const grooveTimers = [];   // keep track of all scheduled intervals/timeouts

    function log(msg) { console.log(msg); logEl.textContent = msg; }

    async function ensureResumed() {
      if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    // Play a single note for durationMs, on given channel
    function note(ch, midiNote, vel = 90, durationMs = 300) {
      synth.noteOn(ch, midiNote, vel);
      const t = setTimeout(() => synth.noteOff(ch, midiNote), durationMs);
      grooveTimers.push(t);
    }

    function stopAll() {
      grooveTimers.forEach(t => clearTimeout(t));
      grooveTimers.length = 0;
      // All notes off on all channels
      for (let ch = 0; ch < 16; ch++) {
        synth.controllerChange(ch, 123, 0);   // All Notes Off
      }
      log('■ stopped');
    }

    // ── Grooves ─────────────────────────────────────────────────────────────

    function scheduleGroove(steps, stepMs, repeat = true) {
      let step = 0;
      function tick() {
        steps[step % steps.length]();
        step++;
        if (repeat || step < steps.length) {
          grooveTimers.push(setTimeout(tick, stepMs));
        }
      }
      tick();
    }

    function pianoRiff() {
      stopAll();
      const notes = [60, 64, 67, 72, 67, 64];
      scheduleGroove(notes.map(n => () => note(0, n, 80, 250)), 300);
      log('▶ Piano riff');
    }

    function bassRiff() {
      stopAll();
      const pattern = [36, 40, 43, 36, 43, 40, 36, 43];
      scheduleGroove(pattern.map(n => () => note(1, n, 95, 350)), 300);
      log('▶ Bass riff');
    }

    function guitarRiff() {
      stopAll();
      // Fingerpicked arpeggio: C major (C3–E3–G3–B3–E4)
      const arpeggioNotes = [48, 52, 55, 59, 64, 59, 55, 52];
      scheduleGroove(arpeggioNotes.map(n => () => note(2, n, 72, 350)), 250);
      log('▶ Guitar riff');
    }

    function drumGroove() {
      stopAll();
      // 8th-note groove: kick on 1&3, snare on 2&4, hi-hat every 8th
      const K = 36, S = 38, H = 42;
      const steps = [
        () => { note(9, K, 100, 80); note(9, H, 70, 60); },  // 1
        () => {                       note(9, H, 60, 60); },  // +
        () => {  note(9, S, 90, 80); note(9, H, 70, 60); },  // 2
        () => {                       note(9, H, 60, 60); },  // +
        () => { note(9, K, 100, 80); note(9, H, 70, 60); },  // 3
        () => {                       note(9, H, 60, 60); },  // +
        () => {  note(9, S, 90, 80); note(9, H, 70, 60); },  // 4
        () => {                       note(9, H, 60, 60); },  // +
      ];
      scheduleGroove(steps, 200);
      log('▶ Drum groove');
    }

    function band() {
      stopAll();
      // Kick + hihat
      const K = 36, S = 38, H = 42;
      const drumSteps = [
        () => { note(9, K, 100, 80); note(9, H, 65, 60); },
        () => {                       note(9, H, 55, 60); },
        () => {  note(9, S, 90, 80); note(9, H, 65, 60); },
        () => {                       note(9, H, 55, 60); },
        () => { note(9, K, 100, 80); note(9, H, 65, 60); },
        () => {                       note(9, H, 55, 60); },
        () => {  note(9, S, 90, 80); note(9, H, 65, 60); },
        () => {                       note(9, H, 55, 60); },
      ];
      // Bass: whole-step walk C–D–E–G
      const bassNotes = [36, 38, 40, 43, 36, 38, 40, 43];
      // Piano chord stabs on beats 2 & 4
      const pianoSteps = [null, null, [60,64,67], null, null, null, [60,64,67], null];

      const STEP = 200; // ms per 8th note
      const TOTAL = 32 * STEP; // 4 bars × 8 steps

      scheduleGroove(drumSteps, STEP);
      scheduleGroove(bassNotes.map(n => () => note(1, n, 90, 350)), STEP);
      scheduleGroove(pianoSteps.map(p => () => {
        if (p) p.forEach(n => note(0, n, 75, 300));
      }), STEP);

      // Auto-stop after 4 bars
      grooveTimers.push(setTimeout(() => { stopAll(); log('■ band ended'); }, TOTAL + 100));
      log('▶ Band: drums + bass + piano (4 bars)');
    }

    // ── Init ─────────────────────────────────────────────────────────────────

    try {
      audioCtx = new AudioContext();

      statusEl.textContent = 'Loading AudioWorklet…';
      await audioCtx.audioWorklet.addModule(WORKER_URL);

      synth = new WorkletSynthesizer(audioCtx);
      await synth.isReady;
      synth.connect(audioCtx.destination);

      statusEl.textContent = 'Loading SoundFont…';
      const sf2Res = await fetch(SOUNDFONT_URL);
      if (!sf2Res.ok) throw new Error(`SoundFont ${sf2Res.status}`);
      await synth.soundBankManager.addSoundBank(await sf2Res.arrayBuffer(), 'main');

      // Set instrument programs
      synth.programChange(0, 0);   // ch 0 = Acoustic Grand Piano
      synth.programChange(1, 32);  // ch 1 = Acoustic Bass
      synth.programChange(2, 25);  // ch 2 = Nylon String Guitar
      // ch 9 is always GM drums — no programChange needed

      statusEl.textContent = '✓ Ready';
      ui.style.opacity = '1';
      ui.style.pointerEvents = 'auto';
      log('✓ Piano · Bass · Guitar · Drums ready');

      // ── Single-note buttons ──────────────────────────────────────────────
      document.querySelectorAll('[data-note]').forEach(btn => {
        btn.addEventListener('click', async () => {
          await ensureResumed();
          const ch   = parseInt(btn.dataset.ch);
          const midi = parseInt(btn.dataset.note);
          note(ch, midi, 90, 500);
          log(`▶ note ${midi} ch ${ch}`);
        });
      });

      // ── Chord ────────────────────────────────────────────────────────────
      document.getElementById('chordBtn').addEventListener('click', async () => {
        await ensureResumed();
        [60, 64, 67].forEach(n => note(0, n, 80, 800));
        log('▶ C maj chord (Piano)');
      });

      // ── Guitar chord ─────────────────────────────────────────────────────
      document.getElementById('guitarChordBtn').addEventListener('click', async () => {
        await ensureResumed();
        [48, 52, 55, 60, 64].forEach(n => note(2, n, 75, 900));
        log('▶ C maj voicing (Guitar)');
      });

      // ── Grooves ──────────────────────────────────────────────────────────
      document.getElementById('pianoRiffBtn').addEventListener('click', async () => { await ensureResumed(); pianoRiff(); });
      document.getElementById('bassRiffBtn') .addEventListener('click', async () => { await ensureResumed(); bassRiff();  });
      document.getElementById('guitarRiffBtn').addEventListener('click', async () => { await ensureResumed(); guitarRiff(); });
      document.getElementById('drumGrooveBtn').addEventListener('click', async () => { await ensureResumed(); drumGroove(); });
      document.getElementById('bandBtn')     .addEventListener('click', async () => { await ensureResumed(); band();       });
      document.getElementById('stopBtn')     .addEventListener('click', () => stopAll());

    } catch (err) {
      statusEl.textContent = '✗ Error — see console';
      log('✗ ' + err.message);
      console.error(err);
    }
  </script>
</body>
</html>
